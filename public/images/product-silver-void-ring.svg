<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">


  <defs>
    <radialGradient id="vr" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#F8F9FC"/>
      <stop offset="100%" stop-color="#E8ECEF"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000018"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A84C30"/>
    </filter>
    <filter id="shdw2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#vr)"/>
<defs>
  <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="35%" stop-color="#C8C8C8"/>
    <stop offset="65%" stop-color="#E8E8E8"/>
    <stop offset="100%" stop-color="#909090"/>
  </linearGradient>
  <linearGradient id="silverV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F5F5F5"/>
    <stop offset="50%" stop-color="#B8B8B8"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient>
  <linearGradient id="silverSheen" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#808080"/>
    <stop offset="30%" stop-color="#F0F0F0"/>
    <stop offset="60%" stop-color="#C0C0C0"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient></defs>
<ellipse cx="400" cy="580" rx="155" ry="18" fill="#0000015" filter="url(#shadow)"/>
<!-- Ring band -->
<ellipse cx="400" cy="420" rx="138" ry="42" fill="none" stroke="url(#silverSheen)" stroke-width="36"/>
<!-- Bottom of ring visible -->
<path d="M 262,420 Q 262,515 400,518 Q 538,515 538,420" fill="url(#silverV)" stroke="url(#silver)" stroke-width="2"/>
<!-- Negative space cutout at top -->
<ellipse cx="400" cy="380" rx="60" ry="22" fill="#F5F7FA"/>
<ellipse cx="400" cy="380" rx="44" ry="15" fill="#F5F7FA"/>
<!-- Geometric frame for cutout -->
<ellipse cx="400" cy="380" rx="62" ry="24" fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
<ellipse cx="400" cy="380" rx="45" ry="17" fill="none" stroke="#D0D0D0" stroke-width="1"/>
<!-- Architectural accent lines -->
<line x1="340" y1="370" x2="340" y2="410" stroke="#C0C0C0" stroke-width="2"/>
<line x1="460" y1="370" x2="460" y2="410" stroke="#C0C0C0" stroke-width="2"/>
<!-- Highlight sheen -->
<ellipse cx="360" cy="418" rx="35" ry="10" fill="white" opacity="0.25"/>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">925 SILVER · BRUSHED & POLISHED · VOID RING</text>
</svg>