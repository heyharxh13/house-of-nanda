<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">


  <defs>
    <radialGradient id="oc" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#F8F9FC"/>
      <stop offset="100%" stop-color="#E8ECEF"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000018"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A84C30"/>
    </filter>
    <filter id="shdw2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#oc)"/>
<defs>
  <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="35%" stop-color="#C8C8C8"/>
    <stop offset="65%" stop-color="#E8E8E8"/>
    <stop offset="100%" stop-color="#909090"/>
  </linearGradient>
  <linearGradient id="silverV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F5F5F5"/>
    <stop offset="50%" stop-color="#B8B8B8"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient>
  <linearGradient id="silverSheen" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#808080"/>
    <stop offset="30%" stop-color="#F0F0F0"/>
    <stop offset="60%" stop-color="#C0C0C0"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient></defs>
<ellipse cx="400" cy="590" rx="190" ry="22" fill="#0000001A" filter="url(#shadow)"/>
<!-- Cuff band - open ended C shape -->
<path d="M 220,320 Q 190,320 180,380 Q 170,440 180,500 Q 190,560 220,560 Q 260,580 400,585 Q 540,580 580,560 Q 610,540 620,500 Q 630,440 620,380 Q 610,320 580,320" fill="none" stroke="url(#silverSheen)" stroke-width="48" stroke-linecap="round"/>
<!-- Inner highlight on cuff -->
<path d="M 230,330 Q 200,330 192,380 Q 182,440 192,500 Q 200,555 230,555 Q 270,572 400,577 Q 530,572 570,555 Q 600,542 608,500 Q 618,440 608,380 Q 600,330 570,330" fill="none" stroke="white" stroke-width="4" opacity="0.25" stroke-linecap="round"/>
<!-- Orbital texture lines -->
<path d="M 240,345 Q 212,345 204,390 Q 195,440 204,490 Q 212,535 240,540" fill="none" stroke="#D0D0D0" stroke-width="1.5" opacity="0.5"/>
<path d="M 560,345 Q 588,345 596,390 Q 605,440 596,490 Q 588,535 560,540" fill="none" stroke="#D0D0D0" stroke-width="1.5" opacity="0.5"/>
<!-- Open gap decorative ends -->
<circle cx="220" cy="322" r="18" fill="url(#silverV)" stroke="#909090" stroke-width="2"/>
<circle cx="580" cy="322" r="18" fill="url(#silverV)" stroke="#909090" stroke-width="2"/>
<circle cx="220" cy="322" r="8" fill="url(#silverSheen)"/>
<circle cx="580" cy="322" r="8" fill="url(#silverSheen)"/>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">925 STERLING SILVER · ORBIT OPEN CUFF</text>
</svg>