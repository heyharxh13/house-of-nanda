<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">


  <defs>
    <radialGradient id="mds" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#F5F5F8"/>
      <stop offset="100%" stop-color="#EAEAF0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000018"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A84C30"/>
    </filter>
    <filter id="shdw2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#mds)"/>
<defs>
  <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="35%" stop-color="#C8C8C8"/>
    <stop offset="65%" stop-color="#E8E8E8"/>
    <stop offset="100%" stop-color="#909090"/>
  </linearGradient>
  <linearGradient id="silverV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F5F5F5"/>
    <stop offset="50%" stop-color="#B8B8B8"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient>
  <linearGradient id="silverSheen" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#808080"/>
    <stop offset="30%" stop-color="#F0F0F0"/>
    <stop offset="60%" stop-color="#C0C0C0"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient></defs>
<ellipse cx="400" cy="560" rx="80" ry="12" fill="#0000015" filter="url(#shadow)"/>
<!-- White gold stud earring - single -->
<g filter="url(#shadow)">
  <!-- Setting base -->
  <circle cx="400" cy="380" r="60" fill="url(#silverSheen)" stroke="#C0C0C0" stroke-width="2.5"/>
  <circle cx="400" cy="380" r="46" fill="none" stroke="#D5D5D5" stroke-width="1.5" opacity="0.6"/>
  <!-- Diamond -->
  
  <polygon points="400,346 423.8,369.8 430.6,390.2 400,414 369.4,390.2 376.2,369.8" fill="#E8F4FF" stroke="#AED6F1" stroke-width="0.8"/>
  <polygon points="400,346 423.8,369.8 400,380" fill="white" opacity="0.7"/>
  <polygon points="400,380 430.6,390.2 400,414" fill="#B3D9F5" opacity="0.6"/>
  <line x1="400" y1="346" x2="400" y2="414" stroke="#AED6F1" stroke-width="0.5"/>
  <!-- 6 prongs -->
  <line x1="428.0" y1="380.0" x2="442.0" y2="380.0" stroke="#B8B8B8" stroke-width="3.5"/>
    <circle cx="442.0" cy="380.0" r="4" fill="url(#silverSheen)"/><line x1="414.0" y1="404.2" x2="421.0" y2="416.4" stroke="#B8B8B8" stroke-width="3.5"/>
    <circle cx="421.0" cy="416.4" r="4" fill="url(#silverSheen)"/><line x1="386.0" y1="404.2" x2="379.0" y2="416.4" stroke="#B8B8B8" stroke-width="3.5"/>
    <circle cx="379.0" cy="416.4" r="4" fill="url(#silverSheen)"/><line x1="372.0" y1="380.0" x2="358.0" y2="380.0" stroke="#B8B8B8" stroke-width="3.5"/>
    <circle cx="358.0" cy="380.0" r="4" fill="url(#silverSheen)"/><line x1="386.0" y1="355.8" x2="379.0" y2="343.6" stroke="#B8B8B8" stroke-width="3.5"/>
    <circle cx="379.0" cy="343.6" r="4" fill="url(#silverSheen)"/><line x1="414.0" y1="355.8" x2="421.0" y2="343.6" stroke="#B8B8B8" stroke-width="3.5"/>
    <circle cx="421.0" cy="343.6" r="4" fill="url(#silverSheen)"/>
  <!-- Post -->
  <rect x="394" y="440" width="12" height="60" rx="6" fill="url(#silverV)" stroke="#C0C0C0" stroke-width="1.5"/>
  <!-- Pushback closure -->
  <rect x="380" y="495" width="40" height="18" rx="9" fill="url(#silverSheen)" stroke="#C0C0C0" stroke-width="1.5"/>
</g>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">IGI CERTIFIED · 0.25CT VVS1 · WHITE GOLD STUD</text>
</svg>