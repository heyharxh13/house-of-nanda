<!-- Crescent moon pendant -->
<g filter="url(#shadow)">
  <!-- Full circle then cut -->
  <circle cx="400" cy="500" r="80" fill="url(#silverSheen)" stroke="#909090" stroke-width="2"/>
  <!-- Cut out to make crescent -->
  <circle cx="430" cy="490" r="72" fill="#F5F7FA"/>
  <!-- Inner sheen -->
  <path d="M 332,480 Q 330,520 400,560 Q 340,530 335,490 Z" fill="white" opacity="0.3"/>
  <!-- Mirror polish highlight -->
  <path d="M 335,460 Q 328,495 338,530" fill="none" stroke="white" stroke-width="4" opacity="0.35" stroke-linecap="round"/>
  <!-- Bail -->
  <ellipse cx="360" cy="430" rx="12" ry="8" fill="url(#silverV)" stroke="#909090" stroke-width="1.5"/>
</g>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">925 STERLING SILVER · HORIZON CRESCENT PENDANT</text>
