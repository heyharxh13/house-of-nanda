<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">


  <defs>
    <radialGradient id="jh" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#FDF9F0"/>
      <stop offset="100%" stop-color="#EDE5CC"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000018"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A84C30"/>
    </filter>
    <filter id="shdw2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#jh)"/>
<defs>
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#E8C96D"/>
    <stop offset="35%" stop-color="#C9A84C"/>
    <stop offset="65%" stop-color="#F0D478"/>
    <stop offset="100%" stop-color="#9A7028"/>
  </linearGradient>
  <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F2D878"/>
    <stop offset="50%" stop-color="#C9A84C"/>
    <stop offset="100%" stop-color="#8B6010"/>
  </linearGradient>
  <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#A07030"/>
    <stop offset="30%" stop-color="#E8C96D"/>
    <stop offset="60%" stop-color="#C9A84C"/>
    <stop offset="100%" stop-color="#906820"/>
  </linearGradient>
  <radialGradient id="bj" cx="40%" cy="30%">
    <stop offset="0%" stop-color="#F5E080"/>
    <stop offset="100%" stop-color="#8B6010"/>
  </radialGradient>
</defs>
<!-- Shadow -->
<ellipse cx="270" cy="590" rx="85" ry="14" fill="#0000018" filter="url(#shadow)"/>
<ellipse cx="530" cy="590" rx="85" ry="14" fill="#00000018" filter="url(#shadow)"/>
<!-- LEFT JHUMKA -->
<g transform="translate(270,290)" filter="url(#glow)">
  <!-- Hook -->
  <path d="M 0,-150 Q 18,-150 18,-130 Q 18,-100 0,-100" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
  <!-- Top disc/cap -->
  <ellipse cx="0" cy="-90" rx="40" ry="12" fill="url(#goldSheen)" stroke="#8B6010" stroke-width="1.5"/>
  <ellipse cx="0" cy="-90" rx="26" ry="7" fill="url(#gold)"/>
  <!-- Dome body -->
  <path d="M -40,-88 Q -45,0 0,30 Q 45,0 40,-88 Z" fill="url(#bj)" stroke="url(#gold)" stroke-width="2"/>
  <!-- Filigree lines on dome -->
  <path d="M -38,-80 Q -26.599999999999998,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M -25,-80 Q -17.5,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M -12,-80 Q -8.399999999999999,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 1,-80 Q 0.7,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 14,-80 Q 9.799999999999999,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 27,-80 Q 18.9,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 40,-80 Q 28,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/>
  <!-- Horizontal ring lines -->
  <ellipse cx="0" cy="-50" rx="37" ry="7" fill="none" stroke="#F5E080" stroke-width="1" opacity="0.4"/>
  <ellipse cx="0" cy="-20" rx="30" ry="5" fill="none" stroke="#F5E080" stroke-width="1" opacity="0.4"/>
  <!-- Bottom ring with drops -->
  <ellipse cx="0" cy="32" rx="38" ry="8" fill="url(#goldSheen)" stroke="#8B6010" stroke-width="1.5"/>
  <!-- Hanging drops -->
  
    <line x1="-30" y1="38" x2="-30" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="-30" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="-15" y1="38" x2="-15" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="-15" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="0" y1="38" x2="0" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="0" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="15" y1="38" x2="15" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="15" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="30" y1="38" x2="30" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="30" cy="78" rx="5" ry="8" fill="url(#bj)"/>
  <!-- Top bead -->
  <circle cx="0" cy="-96" r="9" fill="url(#bj)"/>
  <circle cx="-3" cy="-99" r="3" fill="#F5E080" opacity="0.6"/>
</g>
<!-- RIGHT JHUMKA -->
<g transform="translate(530,290)" filter="url(#glow)">
  <path d="M 0,-150 Q 18,-150 18,-130 Q 18,-100 0,-100" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="0" cy="-90" rx="40" ry="12" fill="url(#goldSheen)" stroke="#8B6010" stroke-width="1.5"/>
  <ellipse cx="0" cy="-90" rx="26" ry="7" fill="url(#gold)"/>
  <path d="M -40,-88 Q -45,0 0,30 Q 45,0 40,-88 Z" fill="url(#bj)" stroke="url(#gold)" stroke-width="2"/>
  <path d="M -38,-80 Q -26.599999999999998,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M -25,-80 Q -17.5,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M -12,-80 Q -8.399999999999999,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 1,-80 Q 0.7,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 14,-80 Q 9.799999999999999,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 27,-80 Q 18.9,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/><path d="M 40,-80 Q 28,5 0,25" fill="none" stroke="#F5E080" stroke-width="0.8" opacity="0.35"/>
  <ellipse cx="0" cy="-50" rx="37" ry="7" fill="none" stroke="#F5E080" stroke-width="1" opacity="0.4"/>
  <ellipse cx="0" cy="-20" rx="30" ry="5" fill="none" stroke="#F5E080" stroke-width="1" opacity="0.4"/>
  <ellipse cx="0" cy="32" rx="38" ry="8" fill="url(#goldSheen)" stroke="#8B6010" stroke-width="1.5"/>
  
    <line x1="-30" y1="38" x2="-30" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="-30" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="-15" y1="38" x2="-15" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="-15" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="0" y1="38" x2="0" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="0" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="15" y1="38" x2="15" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="15" cy="78" rx="5" ry="8" fill="url(#bj)"/>
    <line x1="30" y1="38" x2="30" y2="72" stroke="url(#gold)" stroke-width="2.5"/>
    <ellipse cx="30" cy="78" rx="5" ry="8" fill="url(#bj)"/>
  <circle cx="0" cy="-96" r="9" fill="url(#bj)"/>
  <circle cx="-3" cy="-99" r="3" fill="#F5E080" opacity="0.6"/>
</g>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">22KT GOLD · PAHADI JHUMKA</text>
</svg>