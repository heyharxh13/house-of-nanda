  <line x1="-28" y1="-28" x2="-28" y2="-10" stroke="url(#silver)" stroke-width="1.5"/><line x1="-14" y1="-28" x2="-14" y2="-10" stroke="url(#silver)" stroke-width="1.5"/><line x1="0" y1="-28" x2="0" y2="-10" stroke="url(#silver)" stroke-width="1.5"/><line x1="14" y1="-28" x2="14" y2="-10" stroke="url(#silver)" stroke-width="1.5"/><line x1="28" y1="-28" x2="28" y2="-10" stroke="url(#silver)" stroke-width="1.5"/>
  <rect x="-38" y="-10" width="76" height="18" rx="9" fill="url(#oxidised)" stroke="#909090" stroke-width="1.2"/>
  <line x1="-32" y1="8" x2="-32" y2="30" stroke="url(#silver)" stroke-width="1.5"/><line x1="-16" y1="8" x2="-16" y2="30" stroke="url(#silver)" stroke-width="1.5"/><line x1="0" y1="8" x2="0" y2="30" stroke="url(#silver)" stroke-width="1.5"/><line x1="16" y1="8" x2="16" y2="30" stroke="url(#silver)" stroke-width="1.5"/><line x1="32" y1="8" x2="32" y2="30" stroke="url(#silver)" stroke-width="1.5"/>
  <rect x="-42" y="30" width="84" height="16" rx="8" fill="url(#oxidised)" stroke="#909090" stroke-width="1.2"/>
  
    <line x1="-36" y1="46" x2="-36" y2="76" stroke="url(#silver)" stroke-width="1.8"/>
    <ellipse cx="-36" cy="83" rx="5.5" ry="9" fill="url(#oxidised)"/>
  
    <line x1="-18" y1="46" x2="-18" y2="76" stroke="url(#silver)" stroke-width="1.8"/>
    <ellipse cx="-18" cy="83" rx="5.5" ry="9" fill="url(#oxidised)"/>
  
    <line x1="0" y1="46" x2="0" y2="76" stroke="url(#silver)" stroke-width="1.8"/>
    <ellipse cx="0" cy="83" rx="5.5" ry="9" fill="url(#oxidised)"/>
  
    <line x1="18" y1="46" x2="18" y2="76" stroke="url(#silver)" stroke-width="1.8"/>
    <ellipse cx="18" cy="83" rx="5.5" ry="9" fill="url(#oxidised)"/>
  
    <line x1="36" y1="46" x2="36" y2="76" stroke="url(#silver)" stroke-width="1.8"/>
    <ellipse cx="36" cy="83" rx="5.5" ry="9" fill="url(#oxidised)"/>
  
</g>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">925 SILVER · OXIDISED · AIPAN CHANDELIER</text>
</svg>