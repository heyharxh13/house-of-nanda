<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">


  <defs>
    <radialGradient id="an" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#F8F9FC"/>
      <stop offset="100%" stop-color="#E8ECEF"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000018"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A84C30"/>
    </filter>
    <filter id="shdw2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#an)"/>
<defs>
  <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="35%" stop-color="#C8C8C8"/>
    <stop offset="65%" stop-color="#E8E8E8"/>
    <stop offset="100%" stop-color="#909090"/>
  </linearGradient>
  <linearGradient id="silverV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F5F5F5"/>
    <stop offset="50%" stop-color="#B8B8B8"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient>
  <linearGradient id="silverSheen" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#808080"/>
    <stop offset="30%" stop-color="#F0F0F0"/>
    <stop offset="60%" stop-color="#C0C0C0"/>
    <stop offset="100%" stop-color="#787878"/>
  </linearGradient></defs>
<!-- Chain -->
<path d="M 400,130 L 400,440" stroke="#B8B8B8" stroke-width="1.5"/>
<circle cx="400" cy="130" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="142" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="154" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="166" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="178" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="190" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="202" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="214" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="226" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="238" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="250" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="262" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="274" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="286" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="298" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="310" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="322" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="334" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="346" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="358" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="370" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="382" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="394" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="406" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="418" r="2.2" fill="url(#silverV)"/><circle cx="400" cy="430" r="2.2" fill="url(#silverV)"/>
<!-- Arc pendant -->
<g filter="url(#shadow)">
  <!-- Arc shape - clean architectural -->
  <path d="M 352,440 Q 352,520 400,530 Q 448,520 448,440" fill="none" stroke="url(#silverSheen)" stroke-width="14" stroke-linecap="round"/>
  <!-- Sheen on arc -->
  <path d="M 355,445 Q 355,512 400,522 Q 445,512 445,445" fill="none" stroke="white" stroke-width="2.5" opacity="0.4"/>
  <!-- Bail -->
  <ellipse cx="400" cy="440" rx="12" ry="8" fill="url(#silverV)" stroke="#909090" stroke-width="1.5"/>
</g>
<!-- Chain clasp at top -->
<rect x="386" y="118" width="28" height="14" rx="7" fill="url(#silverV)" stroke="#909090" stroke-width="1.5"/>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">925 STERLING SILVER · ARC MINIMAL NECKLACE</text>
</svg>