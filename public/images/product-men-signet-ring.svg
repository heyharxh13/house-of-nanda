<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">


  <defs>
    <radialGradient id="msr" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#FDF9F0"/>
      <stop offset="100%" stop-color="#EDE5CC"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000018"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#C9A84C30"/>
    </filter>
    <filter id="shdw2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#msr)"/>
<defs>
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#E8C96D"/>
    <stop offset="35%" stop-color="#C9A84C"/>
    <stop offset="65%" stop-color="#F0D478"/>
    <stop offset="100%" stop-color="#9A7028"/>
  </linearGradient>
  <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F2D878"/>
    <stop offset="50%" stop-color="#C9A84C"/>
    <stop offset="100%" stop-color="#8B6010"/>
  </linearGradient>
  <linearGradient id="goldSheen" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#A07030"/>
    <stop offset="30%" stop-color="#E8C96D"/>
    <stop offset="60%" stop-color="#C9A84C"/>
    <stop offset="100%" stop-color="#906820"/>
  </linearGradient></defs>
<ellipse cx="400" cy="580" rx="160" ry="20" fill="#0000001A" filter="url(#shadow)"/>
<!-- Wide ring band -->
<ellipse cx="400" cy="430" rx="138" ry="42" fill="none" stroke="url(#goldSheen)" stroke-width="48"/>
<path d="M 262,430 Q 262,530 400,534 Q 538,530 538,430" fill="url(#goldV)" stroke="url(#gold)" stroke-width="2"/>
<!-- Signet face - wide flat top -->
<rect x="308" y="258" width="184" height="120" rx="14" fill="url(#goldV)" stroke="#8B6010" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="316" y="266" width="168" height="104" rx="11" fill="url(#gold)" opacity="0.5"/>
<!-- Mandana geometric engraving -->
<!-- Outer border -->
<rect x="320" y="270" width="160" height="96" rx="8" fill="none" stroke="#F5E080" stroke-width="1.5" opacity="0.5"/>
<!-- Central diamond motif -->
<polygon points="400,290 436,318 400,346 364,318" fill="none" stroke="#F5E080" stroke-width="1.5" opacity="0.6"/>
<polygon points="400,298 428,318 400,338 372,318" fill="none" stroke="#F5E080" stroke-width="1.2" opacity="0.4"/>
<!-- Cross lines -->
<line x1="400" y1="278" x2="400" y2="358" stroke="#F5E080" stroke-width="1" opacity="0.4"/>
<line x1="326" y1="318" x2="474" y2="318" stroke="#F5E080" stroke-width="1" opacity="0.4"/>
<!-- Corner dots -->
<circle cx="334" cy="282" r="4" fill="url(#gold)" stroke="#8B6010" stroke-width="0.8"/><circle cx="466" cy="282" r="4" fill="url(#gold)" stroke="#8B6010" stroke-width="0.8"/><circle cx="466" cy="354" r="4" fill="url(#gold)" stroke="#8B6010" stroke-width="0.8"/><circle cx="334" cy="354" r="4" fill="url(#gold)" stroke="#8B6010" stroke-width="0.8"/>
<!-- Engraving on band sides -->
<path d="M 310,510 Q 400,528 490,510" fill="none" stroke="#F5E080" stroke-width="1" opacity="0.4"/>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">22KT BIS GOLD · MANDANA ENGRAVED · SIGNET RING</text>
</svg>