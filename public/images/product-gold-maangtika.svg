    <stop offset="100%" stop-color="#8B6010"/>
  </radialGradient>
</defs>
<!-- Central chain from top center -->
<line x1="400" y1="120" x2="400" y2="320" stroke="url(#gold)" stroke-width="3"/>
<circle cx="400" cy="130" r="4" fill="url(#beadMt)"/><circle cx="400" cy="149" r="4" fill="url(#beadMt)"/><circle cx="400" cy="168" r="4" fill="url(#beadMt)"/><circle cx="400" cy="187" r="4" fill="url(#beadMt)"/><circle cx="400" cy="206" r="4" fill="url(#beadMt)"/><circle cx="400" cy="225" r="4" fill="url(#beadMt)"/><circle cx="400" cy="244" r="4" fill="url(#beadMt)"/><circle cx="400" cy="263" r="4" fill="url(#beadMt)"/><circle cx="400" cy="282" r="4" fill="url(#beadMt)"/><circle cx="400" cy="301" r="4" fill="url(#beadMt)"/>
<!-- Side chains going left and right -->
<path d="M 400,175 Q 280,180 160,220" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
<path d="M 400,175 Q 520,180 640,220" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
<!-- Beads on side chains -->
<circle cx="314" cy="177" r="5" fill="url(#beadMt)"/>
  <circle cx="486" cy="177" r="5" fill="url(#beadMt)"/><circle cx="246" cy="182" r="5" fill="url(#beadMt)"/>
  <circle cx="554" cy="182" r="5" fill="url(#beadMt)"/><circle cx="198" cy="191" r="5" fill="url(#beadMt)"/>
  <circle cx="602" cy="191" r="5" fill="url(#beadMt)"/><circle cx="170" cy="204" r="5" fill="url(#beadMt)"/>
