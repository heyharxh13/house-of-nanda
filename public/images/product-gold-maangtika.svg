  <circle cx="400" cy="340" r="36" fill="none" stroke="#F5E080" stroke-width="1.5" opacity="0.5"/>
  <!-- Mandana pattern inside disc -->
  <line x1="418.0" y1="340.0" x2="434.0" y2="340.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/><line x1="412.7" y1="352.7" x2="424.0" y2="364.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/><line x1="400.0" y1="358.0" x2="400.0" y2="374.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/><line x1="387.3" y1="352.7" x2="376.0" y2="364.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/><line x1="382.0" y1="340.0" x2="366.0" y2="340.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/><line x1="387.3" y1="327.3" x2="376.0" y2="316.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/><line x1="400.0" y1="322.0" x2="400.0" y2="306.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/><line x1="412.7" y1="327.3" x2="424.0" y2="316.0" stroke="#F5E080" stroke-width="1.2" opacity="0.5"/>
  <circle cx="400" cy="340" r="12" fill="url(#gold)"/>
  <!-- Diamond center -->
  
  <polygon points="400,332 405.6,337.6 407.2,342.4 400,348 392.8,342.4 394.4,337.6" fill="#E8F4FF" stroke="#AED6F1" stroke-width="0.8"/>
  <polygon points="400,332 405.6,337.6 400,340" fill="white" opacity="0.7"/>
  <polygon points="400,340 407.2,342.4 400,348" fill="#B3D9F5" opacity="0.6"/>
  <line x1="400" y1="332" x2="400" y2="348" stroke="#AED6F1" stroke-width="0.5"/>
</g>
<!-- Teardrop pendant hanging below -->
<g filter="url(#shadow)">
  <line x1="400" y1="388" x2="400" y2="430" stroke="url(#gold)" stroke-width="3"/>
  <path d="M 372,430 Q 400,510 400,510 Q 428,510 428,430 Q 428,415 400,415 Z" fill="url(#goldV)" stroke="#8B6010" stroke-width="1.5"/>
  <path d="M 378,435 Q 400,495 400,495 Q 422,495 422,435" fill="none" stroke="#F5E080" stroke-width="1" opacity="0.5"/>
  
  <polygon points="400,448 408.4,456.4 410.8,463.6 400,472 389.2,463.6 391.6,456.4" fill="#E8F4FF" stroke="#AED6F1" stroke-width="0.8"/>
  <polygon points="400,448 408.4,456.4 400,460" fill="white" opacity="0.7"/>
  <polygon points="400,460 410.8,463.6 400,472" fill="#B3D9F5" opacity="0.6"/>
  <line x1="400" y1="448" x2="400" y2="472" stroke="#AED6F1" stroke-width="0.5"/>
</g>
<!-- Small pearls/gems around disc -->
<circle cx="448.0" cy="320.1" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/><circle cx="448.0" cy="359.9" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/><circle cx="419.9" cy="388.0" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/><circle cx="380.1" cy="388.0" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/><circle cx="352.0" cy="359.9" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/><circle cx="352.0" cy="320.1" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/><circle cx="380.1" cy="292.0" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/><circle cx="419.9" cy="292.0" r="6" fill="url(#beadMt)" stroke="#8B6010" stroke-width="0.8"/>

<g stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.3">
  <path d="M40,40 L40,90 M40,40 L90,40"/>
  <path d="M760,40 L760,90 M760,40 L710,40"/>
  <path d="M40,760 L40,710 M40,760 L90,760"/>
  <path d="M760,760 L760,710 M760,760 L710,760"/>
</g>

  <text x="400" y="748" font-family="Georgia,serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.7">HOUSE OF NANDA · FINE JEWELLERY</text>
  <text x="400" y="728" font-family="Georgia,serif" font-size="11" fill="#8B6914" text-anchor="middle" letter-spacing="2" opacity="0.6">22KT GOLD · PAHADI MAANGTIKA</text>
</svg>